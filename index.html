<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE-=edge" />
    <link rel="stylesheet" href="./src/assets/css/style.css" />
    <title>Task List</title>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="task-app">
          <header class="titulo">
            Hello, you have <span class="remaining-tasks">tasks</span> to do.
            You can do it!
          </header>
          <div class="task-field">
            <input
              class="task-input"
              type="text"
              placeholder="Add your new task..."
              data-app-input
            />
            <span class="datepicker-toggle">
              <span class="datepicker-toggle-button"></span>
              <input
                class="task-date-input"
                type="datetime-local"
                data-app-date
              />
            </span>
            <button class="task-button" data-app-button>Create</button>
          </div>

          <ul class="task-list" data-list></ul>
        </div>
      </div>
    </main>
    <footer class="rodape-container">
      <p class="rodape-conteudo">Made with ☕ by Vinicius Santos.</p>
    </footer>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
